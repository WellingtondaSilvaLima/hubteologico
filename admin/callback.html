<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticando - HUB Teológico</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top-color: #00a8ff;
            border-radius: 50%;
            margin: 1rem auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .success { color: #00e676; }
        .error { color: #ff1744; }
        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #00a8ff, #6c5ce7);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            margin-top: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="status">
            <div class="spinner"></div>
            <h2>🔄 Autenticando com GitHub...</h2>
            <p style="color: #a0a0a0; margin-top: 0.5rem;">Aguarde um momento</p>
        </div>
    </div>

    <script>
        // ============================================================
        //  CONFIGURAÇÕES DO GITHUB OAUTH
        // ============================================================
        const GITHUB_CLIENT_ID = 'Ov23lieipc48wnsbkC3F';
        const GITHUB_USER = 'wellingtondasilvalima';
        const GITHUB_REPO = 'hubteologico';
        
        // URL base do seu site (GitHub Pages)
        const BASE_URL = `https://${GITHUB_USER}.github.io/${GITHUB_REPO}`;
        const REDIRECT_URI = `${BASE_URL}/admin/callback.html`;

        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            const statusDiv = document.getElementById('status');

            // Verificar se houve erro
            if (error) {
                statusDiv.innerHTML = `
                    <h2 class="error">❌ Erro na autenticação</h2>
                    <p>${error}</p>
                    <a href="index.html" class="btn">Voltar ao Login</a>
                `;
                return;
            }

            if (!code) {
                statusDiv.innerHTML = `
                    <h2 class="error">❌ Código de autorização não encontrado</h2>
                    <a href="index.html" class="btn">Voltar ao Login</a>
                `;
                return;
            }

            try {
                localStorage.setItem('github_oauth_authenticated', 'true');
                localStorage.setItem('github_user', GITHUB_USER);
                
                statusDiv.innerHTML = `
                    <h2 class="success">✅ Autenticado com sucesso!</h2>
                    <p>Redirecionando para o painel...</p>
                `;

                // Redirecionar para o painel após 1.5 segundos
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);

            } catch (error) {
                console.error('Erro:', error);
                statusDiv.innerHTML = `
                    <h2 class="error">❌ Erro ao autenticar</h2>
                    <p>${error.message}</p>
                    <a href="index.html" class="btn">Voltar ao Login</a>
                `;
            }
        }

        // Executar quando a página carregar
        handleCallback();
    </script>
</body>
</html>
