name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Generate config file
        run: |
          echo "// Configuração gerada automaticamente pelo GitHub Actions" > admin/config.js
          echo "window.ADMIN_CONFIG = {" >> admin/config.js
          echo "  clientId: '${{ secrets.CI_HT }}'," >> admin/config.js
          echo "  user: '${{ github.repository_owner }}'," >> admin/config.js
          echo "  repo: '${{ github.event.repository.name }}'" >> admin/config.js
          echo "};" >> admin/config.js
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.HUB_ADMIN_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true