<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #4a2f26; } /* Marrom escuro do cabeçalho */
      .accent { fill: #8b5acf; } /* Roxo do ícone original */
      .text-light { fill: #ffffff; font-family: 'Montserrat', 'Segoe UI', sans-serif; font-weight: bold; }
      .text-sub { fill: #ebdcd5; font-family: 'Montserrat', 'Segoe UI', sans-serif; font-weight: 500; letter-spacing: 4px; }
    </style>
  </defs>

  <rect width="500" height="500" rx="40" class="bg" />

  <g transform="translate(150, 80)">
    <path d="M 0,0 L 60,0 L 60,70 L 30,70 L 30,110 L 60,110 L 60,180 L 0,180 Z" fill="#ffffff" />
    
    <path d="M 140,0 L 200,0 L 200,180 L 140,180 L 140,110 L 170,110 L 170,70 L 140,70 Z" fill="#ffffff" />
    
    <rect x="80" y="70" width="40" height="40" class="accent" rx="8" />
  </g>

  <text x="250" y="340" font-size="42" text-anchor="middle" class="text-light">HUB</text>
  
  <text x="250" y="390" font-size="24" text-anchor="middle" class="text-sub">TEOLÓGICO</text>
  
  <line x1="180" y1="420" x2="320" y2="420" stroke="#ebdcd5" stroke-width="2" opacity="0.3" />
</svg>
